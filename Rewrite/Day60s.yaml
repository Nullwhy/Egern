# 每日60S — Egern 模块
# 作者: @Nullwhy
# 更新: 2026-07-23
name: "每日60S"
description: "每天定时推送60秒新闻"
author: "Nullwhy"
icon: "https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/MoeGirlWiki.png"

# 说明：完整 CRON 字符串里的 * 经模块参数替换后，部分版本不会正确重注册定时任务。
# 因此用 HOUR / MINUTE 拼接，通配符写死在模板中，自定义时间更可靠。
compat_arguments:
  MINUTE: "15"
  HOUR: "8"
  MAX_NEWS: "4"
  OPEN_URL: "image"
  DEDUPE: "false"

env_schema:
  MINUTE:
    name: 分钟
    description: 每天触发的分钟（0-59），默认 15
    default_value: "15"
  HOUR:
    name: 小时
    description: 每天触发的小时（0-23），默认 8（即 08:15）
    default_value: "8"
  MAX_NEWS:
    name: 新闻条数
    description: 默认4（适配通知约8行）；0=全部
    default_value: "4"
  OPEN_URL:
    name: 点击打开
    description: image=海报图 / none=不跳转
    options:
      - image
      - none
  DEDUPE:
    name: 同日只推一次
    description: 默认关闭
    options:
      - "true"
      - "false"

scriptings:
  - schedule:
      name: "每日60S"
      # 分 时 日 月 星期 —— * 不走参数，避免自定义 CRON 不触发
      cron: "{{{MINUTE}}} {{{HOUR}}} * * *"
      timeout: 60
      script_url: "https://raw.githubusercontent.com/Nullwhy/Egern/main/Scripts/Day60s.js"
      env:
        MAX_NEWS: "{{{MAX_NEWS}}}"
        OPEN_URL: "{{{OPEN_URL}}}"
        DEDUPE: "{{{DEDUPE}}}"
        API_URL: "https://60s-api.viki.moe/v2/60s"
