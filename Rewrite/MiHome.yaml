# 米家：去除开屏广告 + 隐藏发现
# 适配版本: 11.2.202
# 更新时间: 2026-07-22 21:28

name: "米家"
description: "去除米家开屏广告"
author: "Nullwhy"
icon: "https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/MiHome.png"

mitm:
  hostnames:
    - home.mi.com

# 仅改写真实 JSON 响应，不 Map Local 伪造（避免与空 body/双规则冲突）
body_rewrites:
  # 开屏素材：清空 list，保留其余字段结构
  - response_jq:
      match: "^https://home\\.mi\\.com/cgi-op/api/v1/resource/realtime/openingBanner(?:\\?|$)"
      filter: 'if .data then (.data.list = [] | .) else . end'

  # 隐藏发现：只关 Tab 开关，保留 URL 等字段，减少底栏崩溃
  - response_jq:
      match: "^https://home\\.mi\\.com/cgi-op/api/v1/common/findTabConfig(?:\\?|$)"
      filter: >-
        if .data then
          .data.findTabSwitch = false
          | .data.findTabAccess.findTab = false
          | .data.findTabAccess.youPinTab = false
          | .data.findTabAccess.bbsTabVisible = false
          | .data.findTabAccess.redDot = false
        else . end
