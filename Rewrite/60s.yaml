# 每日60秒 — Egern 模块（脚本写法对齐 Scripts/NodeSeek.js）
name: "每日60秒"
description: "每天 08:15 推送；也可运行「每日60秒-手动」"
author: "Nullwhy"
icon: "newspaper.fill"

compat_arguments:
  MAX_NEWS: "8"
  DEDUPE: "true"

env_schema:
  MAX_NEWS:
    name: 新闻条数
    description: 通知中最多显示几条
    default_value: "8"
  DEDUPE:
    name: 同日只推一次
    description: 定时任务建议 true；手动任务模块内固定 false
    options:
      - "true"
      - "false"

scriptings:
  - schedule:
      name: "每日60秒"
      cron: "15 8 * * *"
      timeout: 60
      script_url: "https://raw.githubusercontent.com/Nullwhy/Egern/main/Scripts/60s.js"
      env:
        MAX_NEWS: "{{{MAX_NEWS}}}"
        DEDUPE: "{{{DEDUPE}}}"
        API_URL: "https://60s-api.viki.moe/v2/60s"

  - generic:
      name: "每日60秒-手动"
      timeout: 60
      script_url: "https://raw.githubusercontent.com/Nullwhy/Egern/main/Scripts/60s.js"
      env:
        MAX_NEWS: "{{{MAX_NEWS}}}"
        DEDUPE: "false"
        API_URL: "https://60s-api.viki.moe/v2/60s"
